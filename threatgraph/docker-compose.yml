services:
  neo4j:
    image: neo4j:5
    container_name: threatgraph-neo4j
    environment:
      - NEO4J_AUTH=neo4j/threatgraph
      - NEO4J_PLUGINS=["graph-data-science"]
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: threatgraph-api
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=threatgraph
    ports:
      - "8000:8000"
    command: >
      sh -c "python scripts/generate_data.py &&
             uvicorn module3_ops.api:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s

volumes:
  neo4j_data: